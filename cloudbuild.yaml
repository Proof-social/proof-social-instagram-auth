steps:
  # Build da imagem Docker
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/proof-social-instagram-auth', '.']

  # Push da imagem para Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/proof-social-instagram-auth']

  # Deploy no Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'proof-social-instagram-auth'
      - '--image'
      - 'gcr.io/$PROJECT_ID/proof-social-instagram-auth'
      - '--platform'
      - 'managed'
      - '--region'
      - 'us-central1'
      # Recursos explícitos — defaults (256Mi/1cpu/300s) eram frágeis.
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '60'
      - '--concurrency'
      - '40'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '10'
      # Auth via Firebase ID Token + OAuth state HMAC dentro da aplicação.
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GOOGLE_CLOUD_PROJECT=proof-social-ai'
      - '--no-clear-env-vars'
      - '--quiet'

images:
  - 'gcr.io/$PROJECT_ID/proof-social-instagram-auth'
